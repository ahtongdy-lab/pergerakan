<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>MDS Smart Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Segoe UI;background:#0f172a;color:white;}

header{
display:flex;justify-content:space-between;align-items:center;
padding:15px;background:#0b1220;flex-wrap:wrap;
}

.logoBox{display:flex;align-items:center;gap:12px;}
.logoBox img{width:55px;height:55px;background:white;padding:5px;border-radius:10px;cursor:pointer;}

.titleBox h2{margin:0;font-size:26px;}
.titleBox p{margin:0;color:#cbd5e1;}

#clock{font-size:32px;}
#date{font-size:18px;color:#cbd5e1;}

.kpiBox{display:flex;gap:10px;padding:10px;flex-wrap:wrap;}
.kpi{flex:1;padding:10px;border-radius:10px;text-align:center;font-weight:bold;}
.green{background:#16a34a;}
.yellow{background:#f59e0b;color:black;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}

#loginBox{
display:flex;flex-direction:column;align-items:center;
justify-content:center;height:80vh;gap:10px;
}

input,button,select,textarea{
padding:10px;border-radius:10px;border:none;width:220px;
}

/* TOP BAR */
.topBar{
display:none;
padding:10px;
gap:10px;
background:#111827;
flex-wrap:wrap;
}

/* FILTER */
.sectionScroll{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
background:#0b1220;
}

.sectionBtn{
padding:8px 14px;
border-radius:20px;
background:#1f2937;
cursor:pointer;
flex:0 0 auto;
}

.sectionBtn.active{background:#3b82f6;}

/* TABLE */
.tableWrap{padding:10px;overflow:auto;}

table{
width:100%;
min-width:1300px;
background:#1f2937;
border-collapse:collapse;
font-size:16px;
}

th,td{
padding:12px;
text-align:center;
border-bottom:1px solid #374151;
}

th{background:#111827;}

img.avatar{
width:45px;height:45px;border-radius:50%;object-fit:cover;
}

/* STATUS */
.status.hadir{background:#16a34a;padding:5px;border-radius:10px;}
.status.cuti{background:#f59e0b;color:black;padding:5px;border-radius:10px;}
.status.tiada{background:#ef4444;padding:5px;border-radius:10px;}
.status.urusan{background:#3b82f6;padding:5px;border-radius:10px;}

/* FORM */
#staffForm{
display:none;
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111827;
padding:20px;
border-radius:10px;
z-index:999;
}

#preview{
width:60px;height:60px;
border-radius:50%;
display:none;
margin:auto;
}

</style>
</head>

<body>

<header>
<div class="logoBox">
<img id="mainLogo" src="logo_mds.png">
<div>
<h2>MAJLIS DAERAH SIMUNJAN</h2>
<p>Smart Attendance System</p>
</div>
</div>

<div>
<div id="clock"></div>
<div id="date"></div>
</div>
</header>

<div class="kpiBox">
<div class="kpi green">Hadir<div id="kpiHadir">0</div></div>
<div class="kpi yellow">Cuti<div id="kpiCuti">0</div></div>
<div class="kpi red">Tiada<div id="kpiTiada">0</div></div>
<div class="kpi blue">Urusan<div id="kpiUrusan">0</div></div>
</div>

<div id="loginBox">
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="guestLogin()">Guest</button>
</div>

<div class="topBar">
<button onclick="openForm()">+ Staf</button>
<button onclick="addLogo()">Add Logo</button>
<button onclick="syncToSheet()">Sync</button>
<button onclick="window.print()">Print</button>
<button onclick="logout()">Log Off</button>

<input type="file" id="logoInput" hidden onchange="changeLogo(event)">
</div>

<!-- FILTER BAHAGIAN -->
<div class="sectionScroll" id="sectionMenu"></div>

<!-- FORM -->
<div id="staffForm">
<input id="s_name" placeholder="Nama">
<input id="s_job" placeholder="Jawatan">

<select id="s_section">
<option>Khidmat Pengurusan</option>
<option>Kewangan</option>
<option>Komuniti</option>
<option>Penguat Kuasa</option>
<option>Kejuruteraan Awam</option>
<option>Kesihatan Awam</option>
<option>Perpustakaan</option>
<option>Penilaian</option>
</select>

<select id="s_pagi">
<option>Hadir</option><option>Cuti</option><option>Tiada</option><option>Urusan</option>
</select>

<select id="s_petang">
<option>Hadir</option><option>Cuti</option><option>Tiada</option><option>Urusan</option>
</select>

<!-- 📷 PHOTO (ADMIN ONLY) -->
<label>Photo Pegawai (Admin)</label>
<input type="file" id="s_photo" onchange="previewPhoto(event)">
<img id="preview">

<textarea id="s_note"></textarea>

<br><br>
<button onclick="saveStaff()">Simpan</button>
<button onclick="closeForm()">Tutup</button>
</div>

<div class="tableWrap">
<table>
<thead>
<tr>
<th>Foto</th>
<th>Nama</th>
<th>Jawatan</th>
<th>Bahagian</th>
<th>Pagi</th>
<th>Petang</th>
<th>Catatan</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="report"></tbody>
</table>
</div>

<script>

const scriptURL="YOUR_GOOGLE_APPS_SCRIPT_URL";

let staff=[];
let currentUser=null;
let activeSection="ALL";
let editId=null;

/* CLOCK */
setInterval(()=>{
let n=new Date();
clock.innerText=n.toLocaleTimeString("ms-MY");
date.innerText=n.toLocaleDateString("ms-MY",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
},1000);

/* LOAD */
function loadSheet(){
fetch(scriptURL).then(r=>r.json()).then(data=>{
staff=data.slice(1).map(r=>({
id:Number(r[0]),
name:r[1],
job:r[2],
section:r[3],
pagi:r[4],
petang:r[5],
note:r[6],
photo:r[7]
}));

buildSectionMenu();
render();
updateKPI();
});
}

/* FILTER MENU */
function buildSectionMenu(){
let list=["ALL",...new Set(staff.map(s=>s.section))];
sectionMenu.innerHTML="";

list.forEach(sec=>{
let d=document.createElement("div");
d.className="sectionBtn"+(activeSection==sec?" active":"");
d.innerText=sec;
d.onclick=()=>{activeSection=sec;render();buildSectionMenu();};
sectionMenu.appendChild(d);
});
}

/* LOGIN */
function login(){
currentUser=(user.value=="admin"&&pass.value=="123")?{role:"admin"}:{role:"guest"};
loginBox.style.display="none";
document.querySelector(".topBar").style.display="flex";
loadSheet();
}

function guestLogin(){
currentUser={role:"guest"};
loginBox.style.display="none";
loadSheet();
}

function logout(){location.reload();}

/* 🖼️ ADD LOGO (ADMIN ONLY) */
function addLogo(){
if(currentUser.role!="admin"){alert("Admin sahaja");return;}
logoInput.click();
}

function changeLogo(e){
let r=new FileReader();
r.onload=ev=>mainLogo.src=ev.target.result;
r.readAsDataURL(e.target.files[0]);
}

/* 📷 PHOTO PREVIEW */
function previewPhoto(e){
if(currentUser.role!="admin"){alert("Admin sahaja");return;}
let r=new FileReader();
r.onload=ev=>{
preview.src=ev.target.result;
preview.style.display="block";
};
r.readAsDataURL(e.target.files[0]);
}

/* FORM */
function openForm(){
if(currentUser.role!="admin")return;
staffForm.style.display="block";
}

function closeForm(){
staffForm.style.display="none";
resetForm();
}

function resetForm(){
s_name.value="";
s_job.value="";
s_section.value="Khidmat Pengurusan";
s_pagi.value="Hadir";
s_petang.value="Hadir";
s_note.value="";
s_photo.value="";
preview.style.display="none";
editId=null;
}

/* SAVE */
function saveStaff(){
if(currentUser.role!="admin")return;

let file=s_photo.files[0];

let save=(img)=>{

staff.push({
id:Date.now(),
name:s_name.value,
job:s_job.value,
section:s_section.value,
pagi:s_pagi.value,
petang:s_petang.value,
note:s_note.value,
photo:img||""
});

render();
updateKPI();
resetForm();
closeForm();
};

if(file){
let r=new FileReader();
r.onload=e=>save(e.target.result);
r.readAsDataURL(file);
}else save();
}

/* DELETE */
function deleteStaff(id){
if(currentUser.role!="admin")return;
if(confirm("Padam data?")){
staff=staff.filter(s=>s.id!=id);
render();
updateKPI();
}
}

/* EDIT */
function editStaff(id){
if(currentUser.role!="admin")return;

let s=staff.find(x=>x.id==id);
editId=id;

s_name.value=s.name;
s_job.value=s.job;
s_section.value=s.section;
s_pagi.value=s.pagi;
s_petang.value=s.petang;
s_note.value=s.note;

openForm();
}

/* RENDER */
function render(){

let list=activeSection=="ALL"?staff:staff.filter(s=>s.section==activeSection);

let html="";

list.forEach(s=>{

let status="HADIR",cls="hadir";
if(s.pagi=="Cuti"&&s.petang=="Cuti"){status="CUTI";cls="cuti";}
else if(s.pagi=="Tiada"&&s.petang=="Tiada"){status="TIADA";cls="tiada";}
else if(s.pagi=="Urusan"){status="URUSAN";cls="urusan";}

html+=`
<tr>
<td>${s.photo?`<img class="avatar" src="${s.photo}">`:"-"}</td>
<td>${s.name}</td>
<td>${s.job}</td>
<td>${s.section}</td>
<td>${s.pagi}</td>
<td>${s.petang}</td>
<td>${s.note||"-"}</td>
<td><span class="status ${cls}">${status}</span></td>
<td>
${currentUser.role=="admin"
?`<button onclick="editStaff(${s.id})">Edit</button>
<button onclick="deleteStaff(${s.id})">Del</button>`
:"-"}
</td>
</tr>`;
});

report.innerHTML=html;
}

/* KPI */
function updateKPI(){
let h=0,c=0,t=0,u=0;

staff.forEach(s=>{
if(s.pagi=="Hadir")h++;
if(s.pagi=="Cuti"&&s.petang=="Cuti")c++;
if(s.pagi=="Tiada")t++;
if(s.pagi=="Urusan")u++;
});

kpiHadir.innerText=h;
kpiCuti.innerText=c;
kpiTiada.innerText=t;
kpiUrusan.innerText=u;
}

</script>

</body>
</html>
