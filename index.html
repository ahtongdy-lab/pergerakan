<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>MDS Smart Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Segoe UI;background:#0f172a;color:white;}

/* HEADER */
header{
display:flex;justify-content:space-between;align-items:center;
padding:15px;background:#0b1220;flex-wrap:wrap;
}

.logoBox{display:flex;align-items:center;gap:12px;}
.logoBox img{width:55px;height:55px;background:white;padding:5px;border-radius:10px;cursor:pointer;}

.titleBox h2{margin:0;font-size:26px;font-weight:900;}
.titleBox p{margin:0;color:#cbd5e1;}

#clock{font-size:32px;font-weight:800;}
#date{font-size:18px;color:#cbd5e1;}

/* KPI */
.kpiBox{display:flex;gap:10px;padding:10px;flex-wrap:wrap;}
.kpi{flex:1;padding:12px;border-radius:10px;text-align:center;font-weight:bold;}
.green{background:#16a34a;}
.yellow{background:#f59e0b;color:black;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}

/* LOGIN */
#loginBox{
display:flex;flex-direction:column;align-items:center;
justify-content:center;height:80vh;gap:10px;
}

input,button,select,textarea{
padding:10px;border-radius:10px;border:none;width:220px;
}

/* TOPBAR */
.topBar{
display:none;padding:10px;gap:10px;background:#111827;flex-wrap:wrap;
}

/* TABLE */
.tableWrap{padding:10px;overflow:auto;}

table{
width:100%;min-width:1200px;
background:#1f2937;border-collapse:collapse;font-size:16px;
}

th,td{
padding:12px;text-align:center;border-bottom:1px solid #374151;
}

th{background:#111827;}

img.avatar{width:45px;height:45px;border-radius:50%;object-fit:cover;}

textarea.noteEdit{
width:160px;height:60px;
}

/* STATUS */
.status.hadir{background:#16a34a;padding:5px;border-radius:10px;}
.status.cuti{background:#f59e0b;color:black;padding:5px;border-radius:10px;}
.status.tiada{background:#ef4444;padding:5px;border-radius:10px;}
.status.urusan{background:#3b82f6;padding:5px;border-radius:10px;}

/* POPUP */
#staffForm{
display:none;
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(0.8);
background:#111827;
padding:20px;
border-radius:10px;
opacity:0;
transition:0.25s ease;
}

#staffForm.show{
display:block;
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

#preview{
width:60px;height:60px;border-radius:50%;
display:none;margin:auto;
}

</style>
</head>

<body>

<header>
<div class="logoBox">
<img id="mainLogo" src="logo_mds.png" onclick="addLogo()">
<div class="titleBox">
<h2>MAJLIS DAERAH SIMUNJAN</h2>
<p>Smart Attendance System</p>
</div>
</div>

<div>
<div id="clock">--:--</div>
<div id="date">---</div>
</div>
</header>

<div class="kpiBox">
<div class="kpi green">Hadir<div id="kpiHadir">0</div></div>
<div class="kpi yellow">Cuti<div id="kpiCuti">0</div></div>
<div class="kpi red">Tiada<div id="kpiTiada">0</div></div>
<div class="kpi blue">Urusan<div id="kpiUrusan">0</div></div>
</div>

<div id="loginBox">
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="guestLogin()">Guest</button>
</div>

<div class="topBar">
<button onclick="openForm()">+ Staf</button>
<button onclick="syncToSheet()">Sync</button>
<button onclick="window.print()">Print</button>
<button onclick="logout()">Log Off</button>
</div>

<!-- FORM -->
<div id="staffForm">
<input id="s_name" placeholder="Nama">
<input id="s_job" placeholder="Jawatan">

<select id="s_pagi">
<option>Hadir</option><option>Cuti</option><option>Tiada</option><option>Urusan</option>
</select>

<select id="s_petang">
<option>Hadir</option><option>Cuti</option><option>Tiada</option><option>Urusan</option>
</select>

<input type="file" id="s_photo" onchange="previewImage(event)">
<img id="preview">

<textarea id="s_note"></textarea>

<br><br>
<button onclick="saveStaff()">Simpan</button>
<button onclick="closeForm()">Tutup</button>
</div>

<div class="tableWrap">
<table>
<thead>
<tr>
<th>Foto</th>
<th>Nama</th>
<th>Jawatan</th>
<th>Pagi</th>
<th>Petang</th>
<th>Catatan</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="report"></tbody>
</table>
</div>

<script>

/* 🔗 GOOGLE SHEET API */
const scriptURL = "https://script.google.com/macros/s/AKfycbz6xfBzLUMEVNST8042mAyVymyJK0_qgQYFtaXaucoZdREm0RuWBSMFixaXZ6p4TY781w/exec";

let staff=[];
let currentUser=null;
let editId=null;

/* CLOCK */
setInterval(()=>{
let n=new Date();
clock.innerText=n.toLocaleTimeString("ms-MY");
date.innerText=n.toLocaleDateString("ms-MY",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
},1000);

/* LOAD */
function loadSheet(){
fetch(scriptURL)
.then(r=>r.json())
.then(data=>{
staff=data.slice(1).map(r=>({
id:Number(r[0]),
name:r[1],
job:r[2],
pagi:r[3],
petang:r[4],
note:r[5],
photo:r[6]
}));
render();updateKPI();
});
}

/* SYNC */
function syncToSheet(){
fetch(scriptURL,{
method:"POST",
body:JSON.stringify(staff)
});
alert("Data disimpan ke Google Sheet");
}

/* LOGIN */
function login(){
currentUser=(user.value=="admin"&&pass.value=="123")?{role:"admin"}:{role:"guest"};
loginBox.style.display="none";
document.querySelector(".topBar").style.display="flex";
loadSheet();
}

function guestLogin(){
currentUser={role:"guest"};
loginBox.style.display="none";
loadSheet();
}

/* LOG OFF */
function logout(){
location.reload();
}

/* LOGO */
function addLogo(){
if(currentUser.role!="admin") return;
alert("Upload logo feature");
}

/* FORM */
function openForm(){
if(currentUser.role!="admin") return;
staffForm.classList.add("show");
}

function closeForm(){
staffForm.classList.remove("show");
resetForm();
}

/* PREVIEW IMAGE */
function previewImage(e){
let r=new FileReader();
r.onload=ev=>{
preview.src=ev.target.result;
preview.style.display="block";
};
r.readAsDataURL(e.target.files[0]);
}

/* RESET FORM */
function resetForm(){
s_name.value="";
s_job.value="";
s_pagi.value="Hadir";
s_petang.value="Hadir";
s_note.value="";
s_photo.value="";
preview.src="";
preview.style.display="none";
editId=null;
}

/* SAVE */
function saveStaff(){

if(currentUser.role!="admin") return;

let file=s_photo.files[0];

let save=(img)=>{

if(editId){
let i=staff.findIndex(s=>s.id==editId);
staff[i]={...staff[i],
name:s_name.value,
job:s_job.value,
pagi:s_pagi.value,
petang:s_petang.value,
note:s_note.value,
photo:img||staff[i].photo
};
}else{
staff.push({
id:Date.now(),
name:s_name.value,
job:s_job.value,
pagi:s_pagi.value,
petang:s_petang.value,
note:s_note.value,
photo:img||""
});
}

render();
updateKPI();
resetForm();
closeForm();
};

if(file){
let r=new FileReader();
r.onload=e=>save(e.target.result);
r.readAsDataURL(file);
}else save();
}

/* DELETE */
function deleteStaff(id){
if(currentUser.role!="admin") return;

if(confirm("Padam staf ini?")){
staff=staff.filter(s=>s.id!=id);
render();
updateKPI();
}
}

/* EDIT */
function editStaff(id){
let s=staff.find(x=>x.id==id);
editId=id;

s_name.value=s.name;
s_job.value=s.job;
s_pagi.value=s.pagi;
s_petang.value=s.petang;
s_note.value=s.note||"";

if(s.photo){
preview.src=s.photo;
preview.style.display="block";
}

openForm();
}

/* KPI */
function updateKPI(){
let h=0,c=0,t=0,u=0;

staff.forEach(s=>{
if(s.pagi=="Hadir")h++;
if(s.pagi=="Cuti"&&s.petang=="Cuti")c++;
if(s.pagi=="Tiada"&&s.petang=="Tiada")t++;
if(s.pagi=="Urusan")u++;
});

kpiHadir.innerText=h;
kpiCuti.innerText=c;
kpiTiada.innerText=t;
kpiUrusan.innerText=u;
}

/* RENDER */
function render(){

let html="";

staff.forEach(s=>{

let status="HADIR",cls="hadir";

if(s.pagi=="Cuti"&&s.petang=="Cuti"){status="CUTI";cls="cuti";}
else if(s.pagi=="Tiada"&&s.petang=="Tiada"){status="TIADA";cls="tiada";}
else if(s.pagi=="Urusan"){status="URUSAN";cls="urusan";}

html+=`
<tr>
<td>${s.photo?`<img class="avatar" src="${s.photo}">`:"-"}</td>
<td>${s.name}</td>
<td>${s.job}</td>
<td>${s.pagi}</td>
<td>${s.petang}</td>
<td>${s.note||"-"}</td>
<td><span class="status ${cls}">${status}</span></td>
<td>
${currentUser.role=="admin"
?`<button onclick="editStaff(${s.id})">Edit</button><button onclick="deleteStaff(${s.id})">Del</button>`
:""}
</td>
</tr>`;
});

report.innerHTML=html;
}

</script>

</body>
</html>
