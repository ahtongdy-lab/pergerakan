<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>MDS Smart Attendance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Segoe UI;background:#0f172a;color:white;}
header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#0b1220;flex-wrap:wrap;}
.logoBox{display:flex;align-items:center;gap:10px;}
.logoBox img{width:55px;height:55px;background:white;padding:5px;border-radius:10px;cursor:pointer;}
#clock{font-size:28px;}
#date{font-size:14px;color:#cbd5e1;}
.kpiBox{display:flex;gap:10px;padding:10px;flex-wrap:wrap;}
.kpi{flex:1;padding:10px;border-radius:10px;text-align:center;font-weight:bold;}
.green{background:#16a34a;}
.yellow{background:#f59e0b;color:black;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}
#loginBox{display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh;gap:10px;}
input,button,select,textarea{padding:10px;border-radius:10px;border:none;width:220px;}
.topBar{display:none;padding:10px;gap:10px;background:#111827;flex-wrap:wrap;}
table{width:100%;border-collapse:collapse;background:#1f2937;}
th,td{padding:10px;text-align:center;border-bottom:1px solid #374151;}
th{background:#111827;}
.btn{padding:6px 10px;border:none;border-radius:8px;cursor:pointer;}
.edit{background:#3b82f6;color:white;}
.del{background:#ef4444;color:white;}
.sync{background:#22c55e;color:white;}
#formBox{
display:none;
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111827;
padding:20px;
border-radius:10px;
z-index:999;
}
.preview{
width:80px;height:80px;
border-radius:10px;
object-fit:cover;
margin-top:5px;
}
.table-photo{
width:45px;height:45px;
border-radius:8px;
object-fit:cover;
}

.status{
padding:6px 10px;
border-radius:10px;
font-size:15px;
font-weight:bold;
display:inline-block;
}

.hadir{background:#16a34a;}
.cuti{background:#f59e0b;color:black;}
.tiada{background:#ef4444;}
.urusan{background:#3b82f6;}
</style>
</head>

<body>

<header>
<div class="logoBox">
<img id="logo" src="logomds.png">
<div>
<h3>MDS Attendance</h3>
<small>Google Sheets System</small>
</div>
</div>

<div>
<div id="clock"></div>
<div id="date"></div>
</div>
</header>

<div class="kpiBox">
<div class="kpi green">Hadir <div id="kpiHadir">0</div></div>
<div class="kpi yellow">Cuti <div id="kpiCuti">0</div></div>
<div class="kpi red">Tiada <div id="kpiTiada">0</div></div>
<div class="kpi blue">Urusan <div id="kpiUrusan">0</div></div>
</div>

<div id="loginBox">
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="guest()">Guest</button>
</div>

<div class="topBar">
<button onclick="openForm()">+ Staf</button>

<select id="filter" onchange="render()">
<option value="all">Semua Bahagian</option>
<option>Khidmat Pengurusan</option>
<option>Komuniti</option>
<option>Penguat Kuasa</option>
<option>Penilaian</option>
<option>Kesihatan Awam</option>
<option>Kejuruteraan Awam</option>
<option>Perpustakaan</option>
<option>Kewangan</option>
</select>

<button class="sync" onclick="sync()">Sync</button>
<button onclick="window.print()">Print</button>
<button onclick="logout()">Log Out</button>
</div>

<!-- FORM -->
<div id="formBox">

<input id="name" placeholder="Nama">
<input id="job" placeholder="Jawatan">

<select id="section">
<option>Khidmat Pengurusan</option>
<option>Komuniti</option>
<option>Penguat Kuasa</option>
<option>Penilaian</option>
<option>Kesihatan Awam</option>
<option>Kejuruteraan Awam</option>
<option>Perpustakaan</option>
<option>Kewangan</option>
</select>

<select id="pagi">
<option>Hadir</option><option>Cuti</option><option>Tiada</option><option>Urusan</option>
</select>

<select id="petang">
<option>Hadir</option><option>Cuti</option><option>Tiada</option><option>Urusan</option>
</select>

<textarea id="note"></textarea>

<input type="file" id="photoInput">
<img id="preview" class="preview" style="display:none">

<button onclick="save()">Simpan</button>
<button onclick="closeForm()">Tutup</button>

</div>

<table>
<thead>
<tr>
<th>Photo</th>
<th>Nama</th>
<th>Jawatan</th>
<th>Bahagian</th>
<th>Pagi</th>
<th>Petang</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

<script>

const URL="https://script.google.com/macros/s/AKfycbyF1BRO95ZCj-ZYkyCGpEynwBeJkcOfRqzxwiyMOxFNUMNlNICTUvkNvb3xNlyN7cNZjw/exec";
const SECRET="mds123";

let data=[];
let editId=null;
let currentUser={role:"guest"};
let photoBase64="";

const el=id=>document.getElementById(id);

/* CLOCK */
setInterval(()=>{
el("clock").innerText=new Date().toLocaleTimeString();
el("date").innerText=new Date().toLocaleDateString();
},1000);

/* LOGIN */
function login(){
currentUser=(el("user").value=="admin" && el("pass").value=="123")
?{role:"admin"}:{role:"guest"};

el("loginBox").style.display="none";
document.querySelector(".topBar").style.display="flex";
load();
}

function guest(){
currentUser={role:"guest"};
el("loginBox").style.display="none";
document.querySelector(".topBar").style.display="flex";
load();
}

function logout(){location.reload();}

/* LOAD */
async function load(){
let res=await fetch(URL);
data=await res.json();
render();
kpi();
}

/* PHOTO */
el("photoInput").addEventListener("change",e=>{
let f=e.target.files[0];
if(!f)return;

let r=new FileReader();
r.onload=ev=>{
photoBase64=ev.target.result;
el("preview").src=photoBase64;
el("preview").style.display="block";
};
r.readAsDataURL(f);
});

/* SAVE */
async function save(){

let obj={
action:editId?"update":"add",
id:editId||Date.now(),
name:el("name").value,
job:el("job").value,
section:el("section").value,
pagi:el("pagi").value,
petang:el("petang").value,
note:el("note").value,
photo:photoBase64,
secret:SECRET
};

await fetch(URL,{method:"POST",body:JSON.stringify(obj)});

editId=null;
photoBase64="";
el("preview").style.display="none";
el("photoInput").value="";

closeForm();
load();
}

/* DELETE */
async function del(id){
if(currentUser.role!="admin")return;

await fetch(URL,{method:"POST",body:JSON.stringify({action:"delete",id,secret:SECRET})});
load();
}

/* 🔥 STATUS LOGIC FIXED */
function statusBadge(pagi, petang){

let status = "HADIR";

/* TIADA paling kuat bila dua-dua TIADA */
if(pagi=="Tiada" && petang=="Tiada"){
status = "TIADA";
}

/* URUSAN override apa-apa */
else if(pagi=="Urusan" || petang=="Urusan"){
status = "URUSAN RASMI";
}

/* CUTI hanya jika dua-dua CUTI */
else if(pagi=="Cuti" && petang=="Cuti"){
status = "CUTI";
}

/* selain semua kes di atas = HADIR (default rules kau) */
else{
status = "HADIR";
}

/* class warna */
let cls="";
if(status=="HADIR") cls="hadir";
if(status=="CUTI") cls="cuti";
if(status=="TIADA") cls="tiada";
if(status=="URUSAN RASMI") cls="urusan";

return `<span class="status ${cls}">${status}</span>`;
}

/* RENDER */
function render(){

let filter=el("filter").value;
let list=data;

if(filter!="all") list=list.filter(x=>x.section==filter);

let h="";

list.forEach(s=>{

let img=s.photo
?`<img src="${s.photo}" class="table-photo">`
:`<div style="width:45px;height:45px;background:#374151;border-radius:8px;"></div>`;

h+=`
<tr>
<td>${img}</td>
<td>${s.name||""}</td>
<td>${s.job||""}</td>
<td>${s.section||""}</td>
<td>${s.pagi||""}</td>
<td>${s.petang||""}</td>
<td>${statusBadge(s.pagi,s.petang)}</td>
<td>
${currentUser.role=="admin"
?`<button class="btn edit" onclick="edit(${s.id})">Edit</button>
<button class="btn del" onclick="del(${s.id})">Del</button>`:""}
</td>
</tr>`;
});

el("tb").innerHTML=h;
}

/* EDIT */
function edit(id){
let s=data.find(x=>String(x.id)==String(id));
if(!s)return;

editId=id;

el("name").value=s.name||"";
el("job").value=s.job||"";
el("section").value=s.section||"";
el("pagi").value=s.pagi||"";
el("petang").value=s.petang||"";
el("note").value=s.note||"";

photoBase64=s.photo||"";
if(photoBase64){
el("preview").src=photoBase64;
el("preview").style.display="block";
}

openForm();
}

/* KPI */
function kpi(){
let h=0,c=0,t=0,u=0;

data.forEach(s=>{
if(s.pagi=="Hadir"&&s.petang=="Hadir")h++;
if(s.pagi=="Cuti"&&s.petang=="Cuti")c++;
if(s.pagi=="Tiada"&&s.petang=="Tiada")t++;
if(s.pagi=="Urusan")u++;
});

el("kpiHadir").innerText=h;
el("kpiCuti").innerText=c;
el("kpiTiada").innerText=t;
el("kpiUrusan").innerText=u;
}

/* UI */
function openForm(){el("formBox").style.display="block";}
function closeForm(){el("formBox").style.display="none";}

/* SYNC */
async function sync(){await load();alert("Synced");}

</script>

</body>
</html>
