<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>MDS Smart Attendance (Stable Version)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Segoe UI;background:#0f172a;color:white;}
header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#0b1220;flex-wrap:wrap;}
.logoBox{display:flex;align-items:center;gap:10px;}
.logoBox img{width:55px;height:55px;background:white;padding:5px;border-radius:10px;cursor:pointer;}
#clock{font-size:28px;}
#date{font-size:14px;color:#cbd5e1;}
.kpiBox{display:flex;gap:10px;padding:10px;flex-wrap:wrap;}
.kpi{flex:1;padding:10px;border-radius:10px;text-align:center;font-weight:bold;}
.green{background:#16a34a;}
.yellow{background:#f59e0b;color:black;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}
#loginBox{display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh;gap:10px;}
input,button,select,textarea{padding:10px;border-radius:10px;border:none;width:220px;}
.topBar{display:none;padding:10px;gap:10px;background:#111827;flex-wrap:wrap;}
table{width:100%;border-collapse:collapse;background:#1f2937;}
th,td{padding:10px;text-align:center;border-bottom:1px solid #374151;}
th{background:#111827;}
.btn{padding:6px 10px;border:none;border-radius:8px;cursor:pointer;}
.edit{background:#3b82f6;color:white;}
.del{background:#ef4444;color:white;}
.sync{background:#22c55e;color:white;}
.logoBtn{background:#10b981;color:white;}
#formBox{
display:none;
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111827;
padding:20px;
border-radius:10px;
z-index:999;
}
</style>
</head>

<body>

<header>
<div class="logoBox">
<img id="logo" src="logo.png">
<div>
<h3>MDS Attendance</h3>
<small>Google Sheets System</small>
</div>
</div>

<div>
<div id="clock"></div>
<div id="date"></div>
</div>
</header>

<div class="kpiBox">
<div class="kpi green">Hadir <div id="kpiHadir">0</div></div>
<div class="kpi yellow">Cuti <div id="kpiCuti">0</div></div>
<div class="kpi red">Tiada <div id="kpiTiada">0</div></div>
<div class="kpi blue">Urusan <div id="kpiUrusan">0</div></div>
</div>

<div id="loginBox">
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="guest()">Guest</button>
</div>

<div class="topBar">
<button onclick="openForm()">+ Staf</button>

<select id="filter" onchange="render()">
<option value="all">Semua Bahagian</option>
<option>Khidmat Pengurusan</option>
<option>Komuniti</option>
<option>Penguat Kuasa</option>
<option>Penilaian</option>
<option>Kesihatan Awam</option>
<option>Kejuruteraan Awam</option>
<option>Perpustakaan</option>
<option>Kewangan</option>
</select>

<button class="sync" onclick="sync()">Sync</button>
<button onclick="window.print()">Print</button>
<button onclick="logout()">Log Out</button>

<button id="logoBtn" class="logoBtn" style="display:none" onclick="changeLogo()">Add Logo</button>
</div>

<!-- FORM -->
<div id="formBox">
<input id="name" placeholder="Nama">
<input id="job" placeholder="Jawatan">

<select id="section">
<option>Khidmat Pengurusan</option>
<option>Komuniti</option>
<option>Penguat Kuasa</option>
<option>Penilaian</option>
<option>Kesihatan Awam</option>
<option>Kejuruteraan Awam</option>
<option>Perpustakaan</option>
<option>Kewangan</option>
</select>

<select id="pagi">
<option>Hadir</option><option>Cuti</option><option>Tiada</option><option>Urusan</option>
</select>

<select id="petang">
<option>Hadir</option><option>Cuti</option><option>Tiada</option><option>Urusan</option>
</select>

<textarea id="note"></textarea>

<button onclick="save()">Simpan</button>
<button onclick="closeForm()">Tutup</button>
</div>

<table>
<thead>
<tr>
<th>Nama</th>
<th>Jawatan</th>
<th>Bahagian</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

<script>

const URL = "https://script.google.com/macros/s/AKfycbyF1BRO95ZCj-ZYkyCGpEynwBeJkcOfRqzxwiyMOxFNUMNlNICTUvkNvb3xNlyN7cNZjw/exec";

/* FIX: no more global DOM dependency */
const clockEl = document.getElementById("clock");
const dateEl = document.getElementById("date");
const userEl = document.getElementById("user");
const passEl = document.getElementById("pass");
const formBoxEl = document.getElementById("formBox");
const logoEl = document.getElementById("logo");

let data=[];
let currentUser={role:"guest"};
let editId=null;

/* CLOCK FIXED */
setInterval(()=>{
clockEl.innerText=new Date().toLocaleTimeString();
dateEl.innerText=new Date().toLocaleDateString();
},1000);

/* LOGIN FIXED */
function login(){
if(userEl.value=="admin" && passEl.value=="123"){
currentUser={role:"admin"};
}else{
currentUser={role:"guest"};
}

document.getElementById("loginBox").style.display="none";
document.querySelector(".topBar").style.display="flex";

document.getElementById("logoBtn").style.display=
currentUser.role=="admin"?"inline-block":"none";

load();
}

function guest(){
currentUser={role:"guest"};
document.getElementById("loginBox").style.display="none";
document.querySelector(".topBar").style.display="flex";
load();
}

function logout(){location.reload();}

/* LOAD */
async function load(){
let res=await fetch(URL);
data=await res.json();
render();
kpi();
}

/* SAVE FIXED (ADD SECRET) */
async function save(){

let obj={
action:editId?"update":"add",
id:editId||Date.now(),
name:name.value,
job:job.value,
section:section.value,
pagi:pagi.value,
petang:petang.value,
note:note.value,
photo:"",
secret:"mds123"
};

await fetch(URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(obj)
});

editId=null;
closeForm();
load();
}

/* DELETE FIXED (ADD SECRET) */
async function del(id){

if(currentUser.role!="admin")return;

await fetch(URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"delete",
id,
secret:"mds123"
})
});

load();
}

/* RENDER (SAFE EDIT FIX) */
function render(){

let filter=document.getElementById("filter").value;

let list=data;
if(filter!="all"){
list=list.filter(x=>x.section==filter);
}

let h="";

list.forEach(s=>{

h+=`
<tr>
<td>${s.name}</td>
<td>${s.job}</td>
<td>${s.section}</td>
<td>${s.pagi}/${s.petang}</td>
<td>
${currentUser.role=="admin"
?`<button class="btn edit" onclick="edit(${s.id})">Edit</button>
<button class="btn del" onclick="del(${s.id})">Del</button>`:""}
</td>
</tr>`;
});

tb.innerHTML=h;
}

/* EDIT FIX SAFE */
function edit(id){
let s=data.find(x=>String(x.id)==String(id));
if(!s) return alert("Data tidak jumpa");

editId=id;

name.value=s.name||"";
job.value=s.job||"";
section.value=s.section||"";
pagi.value=s.pagi||"";
petang.value=s.petang||"";
note.value=s.note||"";

openForm();
}

/* KPI FIX */
function kpi(){
let h=0,c=0,t=0,u=0;

data.forEach(s=>{
if(s.pagi=="Hadir"&&s.petang=="Hadir")h++;
if(s.pagi=="Cuti"&&s.petang=="Cuti")c++;
if(s.pagi=="Tiada"&&s.petang=="Tiada")t++;
if(s.pagi=="Urusan")u++;
});

kpiHadir.innerText=h;
kpiCuti.innerText=c;
kpiTiada.innerText=t;
kpiUrusan.innerText=u;
}

/* UI */
function openForm(){formBoxEl.style.display="block";}
function closeForm(){formBoxEl.style.display="none";}

/* SYNC REAL */
async function sync(){
await load();
alert("Data updated");
}

/* LOGO */
function changeLogo(){
let input=document.createElement("input");
input.type="file";
input.onchange=e=>{
let r=new FileReader();
r.onload=ev=>logoEl.src=ev.target.result;
r.readAsDataURL(e.target.files[0]);
};
input.click();
}

/* INIT */
load();

</script>

</body>
</html>
